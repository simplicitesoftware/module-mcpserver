#             |_| Module: MCPServer 0.1
basePath: /api
paths:
  /login:
    get:
      summary: Login (obtain bearer token)
      security:
      - basicAuth: []
      produces:
      - text/plain
      - application/json
      operationId: login
      responses:
        '200':
          description: Successful login
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
      parameters:
      - in: query
        name: _output
        description: Optional output format
        type: string
        required: false
        enum:
        - json
        - oauth2
        - token
      tags:
      - session
  /logout:
    get:
      summary: Logout (revoke bearer token)
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: logout
      responses:
        '200':
          description: Successfull logout
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
      tags:
      - session
  /rest/McpPrompt:
    get:
      summary: Search McpPrompt business object records or get contextualized metadata
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: obj-mcpprompt-search
      responses:
        '200':
          schema:
            $ref: '#/definitions/ArrayOfMcpPrompt'
          description: Success in searching business object records (or in getting
            contextualized business object metadata, documentation, ...)
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
        '500':
          schema:
            $ref: '#/definitions/Error500'
          description: Internal server error
      parameters:
      - in: query
        name: _metadata
        description: Metadata?
        type: boolean
        required: false
      - in: query
        name: _count
        description: Count?
        type: boolean
        required: false
      - in: query
        name: _doc
        description: Documentation?
        type: boolean
        required: false
      - in: query
        name: mcpMcppromptName
        description: Search filter for Name
        type: string
        required: false
      - in: query
        name: mcpMcppromptLabel
        description: Search filter for Label
        type: string
        required: false
      - in: query
        name: mcpMcppromptContent
        description: Search filter for Content
        type: string
        required: false
      - in: query
        name: mcpMcppromptType
        description: Search filter for Type
        type: string
        required: false
        enum:
        - STA
        - SYS
      - in: query
        name: mcpMcppromptIsActive
        description: Search filter for Active
        type: boolean
        required: false
      - in: query
        name: mcpMcppromptOrder
        description: Search filter for Order
        type: integer
        required: false
      - in: query
        name: mcpProModuleId
        description: Search filter for Module
        type: string
        required: false
      - in: query
        name: mcpProModuleId__mdl_name
        description: Search filter for Module name
        type: string
        required: false
      tags:
      - McpPrompt
  /rest/McpPrompt/{row_id}:
    post:
      summary: Create a new McpPrompt business object record
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: obj-mcpprompt-create
      responses:
        '200':
          schema:
            $ref: '#/definitions/McpPrompt'
          description: Success in creating a new business object record
        '400':
          schema:
            $ref: '#/definitions/Error400'
          description: Bad request
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
        '500':
          schema:
            $ref: '#/definitions/Error500'
          description: Internal server error
      parameters:
      - in: path
        name: row_id
        description: Row ID (or empty or _ for all row IDs)
        type: string
        required: true
      - schema:
          $ref: '#/definitions/McpPrompt'
        in: body
        name: body
      tags:
      - McpPrompt
      consumes:
      - application/json
    get:
      summary: Get a McpPrompt business object record
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: obj-mcpprompt-get
      responses:
        '200':
          schema:
            $ref: '#/definitions/McpPrompt'
          description: Success in getting a single business object record
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
        '500':
          schema:
            $ref: '#/definitions/Error500'
          description: Internal server error
        '404':
          schema:
            $ref: '#/definitions/Error404'
          description: Not found
      parameters:
      - in: path
        name: row_id
        description: Row ID (or empty or _ for all row IDs)
        type: string
        required: true
      - in: query
        name: _inline_documents
        description: Inline documents?
        type: boolean
        required: false
      - in: query
        name: _inline_thumbnails
        description: Inline documents' thumbnails?
        type: boolean
        required: false
      - in: query
        name: _inline_objects
        description: Inline objects?
        type: boolean
        required: false
      tags:
      - McpPrompt
    delete:
      summary: Delete a McpPrompt business object record
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: obj-mcpprompt-delete
      responses:
        '200':
          description: Success in deleting a business object record
        '400':
          schema:
            $ref: '#/definitions/Error400'
          description: Bad request
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
        '500':
          schema:
            $ref: '#/definitions/Error500'
          description: Internal server error
        '404':
          schema:
            $ref: '#/definitions/Error404'
          description: Not found
      parameters:
      - in: path
        name: row_id
        description: Row ID (or empty or _ for all row IDs)
        type: string
        required: true
      tags:
      - McpPrompt
    put:
      summary: Update a McpPrompt business object record
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: obj-mcpprompt-update
      responses:
        '200':
          schema:
            $ref: '#/definitions/McpPrompt'
          description: Success in updating a business object record
        '400':
          schema:
            $ref: '#/definitions/Error400'
          description: Bad request
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
        '500':
          schema:
            $ref: '#/definitions/Error500'
          description: Internal server error
        '404':
          schema:
            $ref: '#/definitions/Error404'
          description: Not found
      parameters:
      - in: path
        name: row_id
        description: Row ID (or empty or _ for all row IDs)
        type: string
        required: true
      - schema:
          $ref: '#/definitions/McpPrompt'
        in: body
        name: body
      tags:
      - McpPrompt
      consumes:
      - application/json
  /:
    get:
      summary: Get user session information
      security:
      - bearerAuth: []
      produces:
      - application/json
      operationId: info
      responses:
        '200':
          description: Success in getting user session information
        '401':
          schema:
            $ref: '#/definitions/Error401'
          description: Unauthorized
      parameters:
      - in: query
        name: texts
        description: Texts?
        type: boolean
        required: false
      tags:
      - session
securityDefinitions:
  basicAuth:
    type: basic
  bearerAuth:
    in: header
    name: Authorization
    type: apiKey
definitions:
  Error404:
    description: Not found
    type: object
    properties:
      error:
        description: Error message
        type: string
      status:
        description: Error status
        type: integer
        enum:
        - 404
  ActionResult:
    description: Action result
    type: object
    properties:
      result:
        description: Action result
        type: string
  TreeviewData:
    type: object
    properties:
      item:
        description: Object item with lists of linked objects' items
        type: object
  ArrayOfMcpPrompt:
    description: List of Prompts
    type: array
    items:
      $ref: '#/definitions/McpPrompt'
  PublicationResult:
    description: Publication result
    type: object
    properties:
      mime:
        description: MIME type
        type: string
      content:
        description: Content (plain text or base64 encoded)
        type: string
  PlaceData:
    description: Place data
    type: object
    properties:
      coord:
        description: Geographical coordinates
        type: string
      address:
        description: Address
        type: string
      row_id:
        description: Row ID
        type: string
      label1:
        description: 'Label #1'
        type: string
      label2:
        description: 'Label #2'
        type: string
      label3:
        description: 'Label #3'
        type: string
  Error400:
    description: Bad request
    type: object
    properties:
      error:
        description: Error message
        type: string
      status:
        description: Error status
        type: integer
        enum:
        - 400
  Error401:
    description: Unauthorized
    type: object
    properties:
      error:
        description: Error message
        type: string
      status:
        description: Error status
        type: integer
        enum:
        - 401
  Error500:
    description: Internal server error
    type: object
    properties:
      error:
        description: Error message
        type: string
      status:
        description: Error status
        type: integer
        enum:
        - 500
  PlaceMapData:
    description: Places map data
    type: object
    properties:
      places:
        description: Places
        type: array
        items:
          $ref: '#/definitions/PlaceData'
      name:
        description: Name
        type: string
  Error403:
    description: Forbidden
    type: object
    properties:
      error:
        description: Error message
        type: string
      status:
        description: Error status
        type: integer
        enum:
        - 403
  McpPrompt:
    description: Prompts
    type: object
    properties:
      mcpMcppromptIsActive:
        description: Active
        type: boolean
      mcpMcppromptOrder:
        description: Order
        type: integer
      mcpMcppromptContent:
        description: Content
        type: string
        maxLength: 100000
      mcpMcppromptLabel:
        description: Label
        type: string
        maxLength: 100
      mcpMcppromptType:
        description: Type
        type: string
        maxLength: 100
        enum:
        - STA
        - SYS
      mcpProModuleId:
        description: Module
        type: string
        maxLength: 11
      row_id:
        description: Unique technical row ID
        type: string
        maxLength: 11
      mcpMcppromptName:
        description: Name
        type: string
        maxLength: 100
      mcpProModuleId__mdl_name:
        description: Module name
        type: string
        maxLength: 100
swagger: '2.0'
info:
  license:
    name: Simplicite license
    url: http://www.simplicitesoftware.com
  contact:
    name: Simplicite Software
    url: http://www.simplicitesoftware.com
    email: contact@simplicitesoftware.com
  description: API for module MCPServer
  title: MCPServer
  version: '0.1'
tags:
- name: McpPrompt
  description: Prompts
